on:
  - pull_request

permissions:
  contents: read
  pull-requests: write

env:
  LW_ACCOUNT: ${{ secrets.LW_ACCOUNT }}
  LW_SUBACCOUNT: ${{ secrets.LW_SUBACCOUNT }}
  LW_API_KEY: ${{ secrets.LW_API_KEY }}
  LW_API_SECRET: ${{ secrets.LW_API_SECRET }}

name: Lacework Code Security (PR)
jobs:
  run-analysis:
    runs-on: self-hosted
    name: Checkout code
    strategy:
      matrix:
        target: [new]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Checkout old
        if: ${{ matrix.target == 'old' }}
        run: git checkout HEAD^1
  sca-scanning:
    runs-on: self-hosted
    name: SCA Scan
    needs:
      - run-analysis
    steps:
      - run: |
          lacework sca scan .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  iac-scanning:
    runs-on: self-hosted
    name: IaC Scan
    needs:
      - run-analysis
      - sca-scanning
    steps:
      - run: |
          lacework iac scan --directory .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
